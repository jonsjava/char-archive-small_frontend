# Production stack. Easiest path: ./setup.sh (or setup.ps1 on Windows).
# Manual: copy .env.example to .env, set TORRENT_DIR / paths, docker compose up -d.
# First-time DB import without setup script: merge docker-compose.import.yml.

x-postgres-env: &postgres-env
  POSTGRES_USER: ${POSTGRES_USER:-char_archive}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
  POSTGRES_DB: ${POSTGRES_DB:-char_archive}

x-frontend-env: &frontend-env
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: ${POSTGRES_DB:-char_archive}
  DB_USER: ${POSTGRES_USER:-char_archive}
  DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
  ARCHIVE_PATH: /archive
  IMAGE_LAYOUT: ${IMAGE_LAYOUT:-sharded}
  IMAGE_SUBDIR: ${IMAGE_SUBDIR:-hashed-data}
  ENABLE_BROWSE_ALL: ${ENABLE_BROWSE_ALL:-false}

x-importer-env: &importer-env
  <<: *frontend-env
  IMPORT_DIR: /import
  IMPORT_SCAN_INTERVAL: ${IMPORT_SCAN_INTERVAL:-60}

services:
  frontend:
    build:
      context: ./small_front
      dockerfile: Dockerfile
    container_name: char_archive_frontend
    restart: unless-stopped
    environment:
      <<: *frontend-env
    volumes:
      - ${ARCHIVE_HOST_PATH:-./archive}:/archive:ro
    ports:
      - target: 5000
        published: ${FRONTEND_PORT:-8080}
        host_ip: ${BIND_HOST:-0.0.0.0}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/stats')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - char_archive_network

  importer:
    build:
      context: ./small_front
      dockerfile: Dockerfile
    container_name: char_archive_importer
    restart: unless-stopped
    command: ["python", "import_watcher.py"]
    environment:
      <<: *importer-env
    volumes:
      - ${ARCHIVE_HOST_PATH:-./archive}:/archive
      - ./import:/import
    networks:
      - char_archive_network

networks:
  char_archive_network:
    driver: bridge
